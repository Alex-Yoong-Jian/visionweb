<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; media-src mediastream: blob:; connect-src 'none';" />
  <title>VisionWeb</title>
  <style>
    /* ── Reset & Base ── */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; }

    /* ── Prevent all default interactions ── */
    body { user-select: none; -webkit-user-select: none; touch-action: none; }

    /* ── Screens ── */
    .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.4s ease; }
    .screen.hidden { opacity: 0; pointer-events: none; }

    /* ── Loading Screen ── */
    #screen-loading { background: #fff; gap: 24px; }
    .loader-ring { width: 48px; height: 48px; border: 3px solid #eee; border-top-color: #1F4E79; border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text { font-size: 15px; color: #888; letter-spacing: 0.04em; }

    /* ── Prompt Screen ── */
    #screen-prompt { background: #fff; gap: 32px; padding: 2rem; }
    .app-name { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; color: #1F4E79; text-transform: uppercase; }
    .prompt-icon { width: 72px; height: 72px; border-radius: 50%; background: #F0F4F8; display: flex; align-items: center; justify-content: center; }
    .prompt-icon svg { width: 36px; height: 36px; stroke: #1F4E79; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .prompt-text-en { font-size: 28px; font-weight: 600; color: #111; text-align: center; line-height: 1.3; }
    .prompt-text-my { font-size: 18px; font-weight: 400; color: #666; text-align: center; line-height: 1.4; }
    .prompt-hint { font-size: 13px; color: #aaa; text-align: center; margin-top: 8px; }

    /* ── Camera Screen ── */
    #screen-camera { background: #000; }
    #camera-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

    /* ── Camera overlay elements ── */
    .cam-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

    /* Centre reticle */
    .reticle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 180px; }
    .reticle-corner { position: absolute; width: 24px; height: 24px; border-color: rgba(255,255,255,0.8); border-style: solid; }
    .reticle-corner.tl { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .reticle-corner.tr { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .reticle-corner.bl { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
    .reticle-corner.br { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    /* Progress ring */
    .progress-wrap { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; height: 220px; }
    .progress-svg { width: 220px; height: 220px; transform: rotate(-90deg); }
    .progress-track { fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 3; }
    .progress-fill { fill: none; stroke: #fff; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 628; stroke-dashoffset: 628; transition: stroke-dashoffset 0.1s linear; }

    /* Hold instruction at bottom */
    .cam-instruction { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); text-align: center; }
    .cam-instruction-en { font-size: 16px; font-weight: 500; color: rgba(255,255,255,0.9); }
    .cam-instruction-my { font-size: 13px; color: rgba(255,255,255,0.55); margin-top: 4px; }

    /* Status badge top */
    .cam-status { position: absolute; top: 48px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.45); backdrop-filter: blur(8px); border: 0.5px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 6px 16px; font-size: 13px; color: rgba(255,255,255,0.8); white-space: nowrap; transition: opacity 0.3s; }

    /* ── Result Screen ── */
    #screen-result { background: #fff; gap: 20px; padding: 2.5rem; }
    .result-label { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; color: #1F4E79; text-transform: uppercase; }
    .result-mode-badge { padding: 4px 14px; border-radius: 12px; font-size: 12px; font-weight: 500; border: 1px solid #ddd; color: #555; }
    .result-text-en { font-size: 22px; font-weight: 600; color: #111; text-align: center; line-height: 1.4; max-width: 340px; }
    .result-text-my { font-size: 16px; color: #666; text-align: center; line-height: 1.5; max-width: 340px; }
    .result-again { font-size: 13px; color: #aaa; text-align: center; margin-top: 12px; }
    .result-divider { width: 40px; height: 2px; background: #eee; border-radius: 1px; }

    /* ── Error Screen ── */
    #screen-error { background: #fff; gap: 16px; padding: 2rem; text-align: center; }
    .error-title { font-size: 20px; font-weight: 600; color: #c0392b; }
    .error-msg { font-size: 15px; color: #666; max-width: 300px; line-height: 1.6; }
  </style>
</head>
<body>

  <!-- ═══════════ SCREEN: LOADING ═══════════ -->
  <div class="screen" id="screen-loading">
    <div class="loader-ring"></div>
    <div class="loader-text">Starting VisionWeb…</div>
  </div>

  <!-- ═══════════ SCREEN: PROMPT ═══════════ -->
  <div class="screen hidden" id="screen-prompt">
    <div class="app-name">VisionWeb</div>
    <div class="prompt-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
    <div class="prompt-text-en">Hold the screen<br>to start</div>
    <div class="prompt-text-my">Tahan skrin<br>untuk mula</div>
    <div class="prompt-hint">Hold anywhere on the screen for 3.5 seconds</div>
  </div>

  <!-- ═══════════ SCREEN: CAMERA ═══════════ -->
  <div class="screen hidden" id="screen-camera">
    <video id="camera-video" autoplay playsinline muted></video>
    <div class="cam-overlay">
      <div class="cam-status" id="cam-status">Camera ready</div>
      <div class="progress-wrap">
        <svg class="progress-svg" viewBox="0 0 220 220">
          <circle class="progress-track" cx="110" cy="110" r="100"/>
          <circle class="progress-fill" id="progress-ring" cx="110" cy="110" r="100"/>
        </svg>
      </div>
      <div class="reticle">
        <div class="reticle-corner tl"></div>
        <div class="reticle-corner tr"></div>
        <div class="reticle-corner bl"></div>
        <div class="reticle-corner br"></div>
      </div>
      <div class="cam-instruction">
        <div class="cam-instruction-en" id="cam-instruction-en">Hold to scan</div>
        <div class="cam-instruction-my" id="cam-instruction-my">Tahan untuk imbas</div>
      </div>
    </div>
  </div>

  <!-- ═══════════ SCREEN: RESULT ═══════════ -->
  <div class="screen hidden" id="screen-result">
    <div class="result-label">Detected</div>
    <div class="result-mode-badge" id="result-mode">Portrait mode</div>
    <div class="result-divider"></div>
    <div class="result-text-en" id="result-text-en">—</div>
    <div class="result-text-my" id="result-text-my">—</div>
    <div class="result-again">Hold anywhere to scan again</div>
  </div>

  <!-- ═══════════ SCREEN: ERROR ═══════════ -->
  <div class="screen hidden" id="screen-error">
    <div class="error-title">Camera unavailable</div>
    <div class="error-msg" id="error-msg">Please allow camera access and reload the page.</div>
  </div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════
   MODULE: SCREEN MANAGER
   Handles showing and hiding screens
═══════════════════════════════════════════════════════ */
const ScreenManager = (() => {
  const screens = {
    loading: document.getElementById('screen-loading'),
    prompt:  document.getElementById('screen-prompt'),
    camera:  document.getElementById('screen-camera'),
    result:  document.getElementById('screen-result'),
    error:   document.getElementById('screen-error'),
  };

  function show(name) {
    Object.entries(screens).forEach(([key, el]) => {
      el.classList.toggle('hidden', key !== name);
    });
  }

  return { show };
})();


/* ═══════════════════════════════════════════════════════
   MODULE: AUDIO
   Handles all speech synthesis — bilingual (EN + MY)
   Exposes: Audio.speak(en, my), Audio.prompt()
═══════════════════════════════════════════════════════ */
const Audio = (() => {
  const synth = window.speechSynthesis;
  let voices = [];

  function loadVoices() {
    voices = synth.getVoices();
  }
  loadVoices();
  if (speechSynthesis.onvoiceschanged !== undefined) {
    speechSynthesis.onvoiceschanged = loadVoices;
  }

  function findVoice(lang) {
    return voices.find(v => v.lang.startsWith(lang)) || null;
  }

  function speakLine(text, lang, rate = 0.95) {
    return new Promise(resolve => {
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = lang;
      utt.rate = rate;
      utt.pitch = 1;
      const voice = findVoice(lang);
      if (voice) utt.voice = voice;
      utt.onend = resolve;
      utt.onerror = resolve;
      synth.speak(utt);
    });
  }

  async function speak(en, my) {
    synth.cancel();
    await speakLine(en, 'en');
    if (my) await speakLine(my, 'ms');
  }

  async function prompt() {
    await speak(
      'Hold the screen to start.',
      'Tahan skrin untuk mula.'
    );
  }

  return { speak, prompt };
})();


/* ═══════════════════════════════════════════════════════
   MODULE: CAMERA
   Handles camera stream start and stop
   Exposes: Camera.start(), Camera.stop(), Camera.capture()
═══════════════════════════════════════════════════════ */
const Camera = (() => {
  const video = document.getElementById('camera-video');
  let stream = null;

  async function start() {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(resolve => video.onloadedmetadata = resolve);
  }

  function stop() {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
      stream = null;
      video.srcObject = null;
    }
  }

  function capture() {
    const canvas = document.createElement('canvas');
    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    return canvas;
  }

  return { start, stop, capture };
})();


/* ═══════════════════════════════════════════════════════
   MODULE: HOLD DETECTION
   3.5 second hold timer with progress ring
   Fires onComplete when hold is sustained
   Fires onRelease if user releases early
   Exposes: HoldDetection.init(onComplete, onRelease)
═══════════════════════════════════════════════════════ */
const HoldDetection = (() => {
  const HOLD_MS    = 3500;
  const CIRCUMFERENCE = 2 * Math.PI * 100; // r=100 matches SVG
  const ring       = document.getElementById('progress-ring');
  const statusEl   = document.getElementById('cam-status');
  const instrEN    = document.getElementById('cam-instruction-en');
  const instrMY    = document.getElementById('cam-instruction-my');

  let holdTimer    = null;
  let startTime    = null;
  let rafId        = null;
  let isHolding    = false;
  let onComplete   = null;
  let onRelease    = null;

  function setStatus(msg) { statusEl.textContent = msg; }

  function setProgress(pct) {
    const offset = CIRCUMFERENCE * (1 - pct);
    ring.style.strokeDashoffset = offset;
  }

  function tick() {
    const elapsed = Date.now() - startTime;
    const pct = Math.min(elapsed / HOLD_MS, 1);
    setProgress(pct);
    if (pct < 1) {
      rafId = requestAnimationFrame(tick);
    }
  }

  function startHold() {
    if (isHolding) return;
    isHolding = true;
    startTime = Date.now();
    setStatus('Hold steady…  /  Tahan…');
    instrEN.textContent = 'Keep holding…';
    instrMY.textContent = 'Teruskan tahan…';
    rafId = requestAnimationFrame(tick);
    holdTimer = setTimeout(() => {
      cancelAnimationFrame(rafId);
      setProgress(1);
      if (onComplete) onComplete();
    }, HOLD_MS);
  }

  function endHold() {
    if (!isHolding) return;
    isHolding = false;
    clearTimeout(holdTimer);
    cancelAnimationFrame(rafId);
    setProgress(0);
    setStatus('Camera ready');
    instrEN.textContent = 'Hold to scan';
    instrMY.textContent = 'Tahan untuk imbas';
    if (onRelease) onRelease();
  }

  function init(completeFn, releaseFn) {
    onComplete = completeFn;
    onRelease  = releaseFn;

    const el = document.getElementById('screen-camera');

    el.addEventListener('mousedown',  () => startHold());
    el.addEventListener('mouseup',    () => endHold());
    el.addEventListener('mouseleave', () => endHold());
    el.addEventListener('touchstart', (e) => { e.preventDefault(); startHold(); }, { passive: false });
    el.addEventListener('touchend',   (e) => { e.preventDefault(); endHold(); },   { passive: false });
    el.addEventListener('touchcancel',(e) => { e.preventDefault(); endHold(); },   { passive: false });
  }

  function reset() {
    isHolding = false;
    clearTimeout(holdTimer);
    cancelAnimationFrame(rafId);
    setProgress(0);
    setStatus('Camera ready');
    instrEN.textContent = 'Hold to scan';
    instrMY.textContent = 'Tahan untuk imbas';
  }

  return { init, reset };
})();


/* ═══════════════════════════════════════════════════════
   MODULE: RESULT DISPLAY
   Shows the detection result on screen
   Exposes: ResultDisplay.show(mode, en, my)
═══════════════════════════════════════════════════════ */
const ResultDisplay = (() => {
  function show(mode, en, my) {
    document.getElementById('result-mode').textContent    = mode;
    document.getElementById('result-text-en').textContent = en;
    document.getElementById('result-text-my').textContent = my;
  }
  return { show };
})();


/* ═══════════════════════════════════════════════════════
   MODULE: APP CONTROLLER
   Orchestrates all modules. State machine:
   loading → prompt → camera → result → camera
═══════════════════════════════════════════════════════ */
const App = (() => {
  let state = 'loading'; // loading | prompt | camera | scanning | result

  async function init() {
    ScreenManager.show('loading');

    // Check for camera support
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      document.getElementById('error-msg').textContent =
        'Your browser does not support camera access. Please use Chrome or Safari.';
      ScreenManager.show('error');
      return;
    }

    // Check for speech synthesis support
    if (!window.speechSynthesis) {
      console.warn('Speech synthesis not available on this device.');
    }

    // Simulate brief load for voice readiness
    await new Promise(r => setTimeout(r, 800));

    // Show prompt and play audio
    ScreenManager.show('prompt');
    state = 'prompt';

    // Play initial bilingual prompt
    Audio.prompt();

    // Listen for hold on prompt screen to start camera
    const promptEl = document.getElementById('screen-prompt');

    function onPromptHold() {
      promptEl.removeEventListener('mousedown',  onPromptHold);
      promptEl.removeEventListener('touchstart', onPromptHold);
      startCamera();
    }

    promptEl.addEventListener('mousedown',  onPromptHold);
    promptEl.addEventListener('touchstart', onPromptHold, { passive: true });
  }

  async function startCamera() {
    try {
      await Camera.start();
      ScreenManager.show('camera');
      state = 'camera';

      // Initialise hold detection
      HoldDetection.init(
        onHoldComplete,  // 3.5s hold achieved
        onHoldRelease    // released early
      );

    } catch (err) {
      console.error('Camera error:', err.name);
      document.getElementById('error-msg').textContent =
        'Camera access was denied. Please allow camera access in your browser settings and reload.  /  Akses kamera ditolak. Sila benarkan akses kamera dan muat semula.';
      ScreenManager.show('error');
    }
  }

  async function onHoldComplete() {
    if (state !== 'camera') return;
    state = 'scanning';

    // Capture the frame
    const frame = Camera.capture();

    // Play capture audio cue
    await Audio.speak(
      'Scanning now.',
      'Mengimbas sekarang.'
    );

    // ── PHASE 1 PLACEHOLDER ──
    // In Phase 2 we will pass `frame` to the detection modules.
    // For now, show a placeholder result to confirm the flow works.
    const placeholderEN = 'Detection coming in Phase 2. Camera and hold detection are working correctly.';
    const placeholderMY = 'Pengesanan akan datang dalam Fasa 2. Kamera dan pengesan tahan berfungsi dengan betul.';

    ResultDisplay.show('Phase 1 — Ready', placeholderEN, placeholderMY);
    Camera.stop();
    ScreenManager.show('result');
    state = 'result';

    await Audio.speak(placeholderEN, placeholderMY);

    // Listen for hold on result screen to scan again
    const resultEl = document.getElementById('screen-result');

    function onResultHold() {
      resultEl.removeEventListener('mousedown',  onResultHold);
      resultEl.removeEventListener('touchstart', onResultHold);
      returnToPrompt();
    }

    resultEl.addEventListener('mousedown',  onResultHold);
    resultEl.addEventListener('touchstart', onResultHold, { passive: true });
  }

  function onHoldRelease() {
    // User released before 3.5s — just reset, stay on camera screen
  }

  async function returnToPrompt() {
    state = 'prompt';
    ScreenManager.show('prompt');
    await Audio.speak(
      'Hold the screen to start again.',
      'Tahan skrin untuk mula semula.'
    );

    const promptEl = document.getElementById('screen-prompt');
    function onPromptHold() {
      promptEl.removeEventListener('mousedown',  onPromptHold);
      promptEl.removeEventListener('touchstart', onPromptHold);
      HoldDetection.reset();
      startCamera();
    }
    promptEl.addEventListener('mousedown',  onPromptHold);
    promptEl.addEventListener('touchstart', onPromptHold, { passive: true });
  }

  return { init };
})();


// ── Bootstrap ──
window.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
